# buildspec.yml — AWS CodeBuild specification for SST deployments

version: 0.2

env:
  variables:
    SST_STAGE: 'dev'
    NODE_VERSION: '22'
    PNPM_VERSION: '9.15.0'
    INFRA_PATH: 'packages/infra'

    # Domain defaults for Expo web deployment
    DOMAIN_ROOT: 'alternun.co'
    INFRA_ROOT_DOMAIN: 'alternun.co'
    INFRA_CANONICAL_ROOT_DOMAIN: 'alternun.co'
    PROJECT_PREFIX: 'alternun'
    PREFIX: 'alternun'
    INFRA_EXPO_APP_PATH: '../../apps/mobile'
    INFRA_CANONICAL_EXPO_APP_PATH: '../../apps/mobile'
    DOMAIN_PRODUCTION: 'airs.alternun.co'
    DOMAIN_DEV: 'testnet.airs.alternun.co'
    DOMAIN_MOBILE: 'preview.airs.alternun.co'
    INFRA_EXPO_DOMAIN_PRODUCTION: 'airs.alternun.co'
    INFRA_EXPO_DOMAIN_DEV: 'testnet.airs.alternun.co'
    INFRA_EXPO_DOMAIN_MOBILE: 'preview.airs.alternun.co'
    INFRA_CANONICAL_EXPO_DOMAIN_PRODUCTION: 'airs.alternun.co'
    INFRA_CANONICAL_EXPO_DOMAIN_DEV: 'testnet.airs.alternun.co'
    INFRA_CANONICAL_EXPO_DOMAIN_MOBILE: 'preview.airs.alternun.co'
    INFRA_CANONICAL_EXPO_CERT_ARN_DEV: 'arn:aws:acm:us-east-1:124120088516:certificate/339fac88-b65a-4d2d-bd07-741e762e7210'
    INFRA_CANONICAL_REDIRECT_AIRS_TO_DEV_CERT_ARN: 'arn:aws:acm:us-east-1:124120088516:certificate/b01e6ac3-7ce2-4761-b51f-c070eadd487a'
    INFRA_CANONICAL_REDIRECT_DEV_TO_TESTNET_CERT_ARN: 'arn:aws:acm:us-east-1:124120088516:certificate/69a8433c-ef7b-4ef6-9033-f51bcb982414'
    INFRA_CANONICAL_REDIRECT_ROOT_CERT_ARN: 'arn:aws:acm:us-east-1:124120088516:certificate/002f3146-f590-4426-affe-1bae8e1e762d'
    INFRA_LOAD_ROOT_ENV: 'false'
    INFRA_PRESERVE_EXISTING_ENV: 'true'
    INFRA_ENFORCE_AWS_ACCOUNT: 'true'
    INFRA_REQUIRE_ROUTE53: 'true'
    INFRA_PIPELINES: 'production,dev,identity-dev,identity-prod,dashboard-dev,dashboard-prod'
    INFRA_ENFORCE_PIPELINE_DELETE_GUARD: 'true'
    INFRA_PIPELINE_BRANCH_IDENTITY_DEV: 'develop'
    INFRA_PIPELINE_BRANCH_IDENTITY_PROD: 'master'
    INFRA_PIPELINE_BRANCH_DASHBOARD_DEV: 'develop'
    INFRA_PIPELINE_BRANCH_DASHBOARD_PROD: 'master'
    INFRA_REQUIRE_EXPO_PUBLIC_AUTH: 'true'
    INFRA_ENABLE_ADMIN_SITE: 'false'
    INFRA_ADMIN_DEDICATED_STACKS_ONLY: 'true'
    INFRA_ADMIN_ENABLED_STAGES: ''
    INFRA_ADMIN_APP_PATH: '../../apps/admin'
    INFRA_ADMIN_BUILD_OUTPUT: 'dist'
    INFRA_ADMIN_BUILD_COMMAND: 'pnpm --filter @alternun/admin run build'
    INFRA_ADMIN_ENABLE_CUSTOM_DOMAIN: 'true'
    INFRA_ADMIN_DOMAIN_PRODUCTION: 'admin.alternun.co'
    INFRA_ADMIN_DOMAIN_DEV: 'testnet.admin.alternun.co'
    INFRA_ADMIN_DOMAIN_MOBILE: 'preview.admin.alternun.co'
    INFRA_ADMIN_CERT_ARN_PRODUCTION: ''
    INFRA_ADMIN_CERT_ARN_DEV: ''
    INFRA_ADMIN_CERT_ARN_MOBILE: ''
    INFRA_ADMIN_API_URL_PRODUCTION: 'https://api.alternun.co'
    INFRA_ADMIN_API_URL_DEV: 'https://testnet.api.alternun.co'
    INFRA_ADMIN_API_URL_MOBILE: 'https://preview.api.alternun.co'
    INFRA_ADMIN_AUTH_ISSUER_PRODUCTION: 'https://sso.alternun.co/application/o/alternun-admin/'
    INFRA_ADMIN_AUTH_ISSUER_DEV: 'https://testnet.sso.alternun.co/application/o/alternun-admin/'
    INFRA_ADMIN_AUTH_ISSUER_MOBILE: 'https://preview.sso.alternun.co/application/o/alternun-admin/'
    INFRA_ADMIN_AUTH_CLIENT_ID: 'alternun-admin'
    INFRA_ADMIN_AUTH_AUDIENCE: 'alternun-app'
    INFRA_ENABLE_BACKEND_API: 'false'
    INFRA_BACKEND_API_DEDICATED_STACKS_ONLY: 'true'
    INFRA_BACKEND_API_ENABLED_STAGES: ''
    INFRA_BACKEND_API_APP_PATH: '../../apps/api'
    INFRA_BACKEND_API_BUILD_OUTPUT: 'dist-lambda'
    INFRA_BACKEND_API_BUILD_COMMAND: 'pnpm --filter @alternun/api run build'
    INFRA_BACKEND_API_ENABLE_CUSTOM_DOMAIN: 'true'
    INFRA_BACKEND_API_DOMAIN_PRODUCTION: 'api.alternun.co'
    INFRA_BACKEND_API_DOMAIN_DEV: 'testnet.api.alternun.co'
    INFRA_BACKEND_API_DOMAIN_MOBILE: 'preview.api.alternun.co'
    INFRA_BACKEND_API_CERT_ARN_PRODUCTION: ''
    INFRA_BACKEND_API_CERT_ARN_DEV: ''
    INFRA_BACKEND_API_CERT_ARN_MOBILE: ''
    INFRA_BACKEND_API_MEMORY_SIZE: '1024'
    INFRA_BACKEND_API_TIMEOUT_SECONDS: '30'
    INFRA_BACKEND_API_ARCHITECTURE: 'arm64'
    INFRA_BACKEND_API_LOG_RETENTION_DAYS: '14'
    INFRA_BACKEND_API_AUTHENTIK_AUDIENCE: 'alternun-app'
    INFRA_BACKEND_API_AUTHENTIK_ISSUER: ''
    INFRA_BACKEND_API_AUTHENTIK_JWKS_URL: ''
    INFRA_BACKEND_API_DATABASE_URL: ''
    INFRA_BACKEND_API_DECAP_PUBLIC_BASE_URL: ''
    INFRA_BACKEND_API_DECAP_ALLOWED_ORIGINS: 'https://docs.alternun.io,https://alternun-development.github.io,http://127.0.0.1:8083,http://localhost:8083'
    INFRA_BACKEND_API_DECAP_GITHUB_CLIENT_ID: ''
    INFRA_BACKEND_API_DECAP_GITHUB_CLIENT_SECRET: ''
    INFRA_BACKEND_API_DECAP_GITHUB_OAUTH_REPO_PRIVATE: 'false'
    INFRA_BACKEND_API_DECAP_GITHUB_OAUTH_SCOPE: ''
    INFRA_BACKEND_API_DECAP_OAUTH_STATE_SECRET: ''
    INFRA_IDENTITY_ENABLED: 'false'
    INFRA_IDENTITY_ENABLED_STAGES: ''
    INFRA_FAIL_ON_SECRET_SYNC: 'false'
    INFRA_ENABLE_SECRET_SYNC: 'true'
    INFRA_ENABLE_PREDEPLOY_CHECKS: 'true'
    INFRA_RUN_UPSTREAM_PREDEPLOY_CHECKS: 'false'
    # managed|explicit : managed prefers SST-managed certificates for empty site cert ARN vars,
    # but preserves any explicit cert ARN overrides so existing ACM certificates can be reused.
    INFRA_CERT_MODE: 'managed'
    # CI should use CodeBuild IAM role (temporary creds), not static keys.
    INFRA_FORCE_ENV_AWS_CREDENTIALS: 'false'
    INFRA_REQUIRE_ENV_AWS_CREDENTIALS: 'false'

    # Check controls
    SKIP_DNS_CHECK: 'false'
    # Safety-first: never delete existing DNS automatically during deploy.
    AUTO_REMOVE_CONFLICTING_DNS: 'false'
    INFRA_REMOVE_ACM_VALIDATION_CNAME: 'false'
    INFRA_ALLOW_DESTRUCTIVE_DEPLOYMENTS: 'false'
    INFRA_FAIL_ON_MANAGED_CERT_CNAME_CONFLICT: 'true'
    # Optional post-deploy DNS sync poll tuning (used only when enabled).
    POLL_TIMEOUT: '120'
    POLL_INTERVAL: '15'
    # Disabled by default: this fallback can add ~10m waiting for CloudFront alias discovery.
    # Enable only for recovery/manual DNS sync runs.
    INFRA_ENABLE_POSTDEPLOY_DNS_SYNC: 'false'
    # Fail the pipeline if deployed endpoints are not reachable.
    INFRA_ENABLE_REACHABILITY_CHECK: 'true'
    INFRA_REACHABILITY_ATTEMPTS: '18'
    INFRA_REACHABILITY_INTERVAL_SECONDS: '10'
    INFRA_REACHABILITY_CONNECT_TIMEOUT_SECONDS: '5'
    INFRA_REACHABILITY_REQUEST_TIMEOUT_SECONDS: '20'
    INFRA_ENFORCE_REDIRECT_CHECKS: 'false'
    # Recovery-only cleanup. The deploy script auto-runs this for dev redirect cutovers
    # only when INFRA_ALLOW_DESTRUCTIVE_DEPLOYMENTS=true, so keep the flag explicit for
    # manual recovery or alias migration runs.
    INFRA_ENABLE_ALIAS_CLEANUP: 'false'
    INFRA_ENABLE_SST_DIFF: 'false'
    INFRA_ENABLE_PUBLIC_ASSET_SYNC: 'true'
    # Disabled by default: refresh can rewrite live state before deploy.
    INFRA_ENABLE_SST_REFRESH: 'false'
    HUSKY: '0'
    EXPO_PUBLIC_WALLETCONNECT_CHAIN_ID: '1'
    # Authentik and Better Auth config are resolved per-stage from the canonical
    # SSM helper in pre_build. Keep these empty here so the helper remains the
    # single source of truth for CI.
    EXPO_PUBLIC_AUTHENTIK_ISSUER: ''
    EXPO_PUBLIC_AUTHENTIK_CLIENT_ID: ''
    EXPO_PUBLIC_AUTHENTIK_REDIRECT_URI: ''
  secrets-manager:
    EXPO_PUBLIC_SUPABASE_URL: 'alternun/ci/infra/expo-public:EXPO_PUBLIC_SUPABASE_URL'
    EXPO_PUBLIC_SUPABASE_KEY: 'alternun/ci/infra/expo-public:EXPO_PUBLIC_SUPABASE_KEY'
    EXPO_PUBLIC_WALLETCONNECT_PROJECT_ID: 'alternun/ci/infra/expo-public:EXPO_PUBLIC_WALLETCONNECT_PROJECT_ID'

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - corepack enable pnpm
      - corepack prepare pnpm@${PNPM_VERSION} --activate
      - pnpm --version
      - |
        stage_normalized=$(echo "${SST_STAGE}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')
        if [ "${INFRA_ENABLE_EXPO_SITE:-true}" = "false" ]; then
          case "${stage_normalized}" in
            identity-dev|identity-prod|identity-production|auth-dev|auth-prod|authentik-dev|authentik-prod|api-dev|api-prod|api-production|backend-dev|backend-prod|backend-api-dev|backend-api-prod|admin-dev|admin-prod|admin-production|backoffice-dev|backoffice-prod|backoffice-admin-dev|backoffice-admin-prod|dashboard-dev|dashboard-prod|dashboard-production)
              ;;
            *)
              echo "WARN: INFRA_ENABLE_EXPO_SITE=false received on non-dedicated stage ${SST_STAGE}; forcing INFRA_ENABLE_EXPO_SITE=true to protect app resources."
              export INFRA_ENABLE_EXPO_SITE=true
              ;;
          esac
        fi
      - |
        install_filters="--filter @alternun/infra..."
        if [ "${INFRA_ENABLE_EXPO_SITE:-true}" = "true" ]; then
          install_filters="${install_filters} --filter @alternun/mobile..."
        fi
        if [ "${INFRA_ENABLE_ADMIN_SITE:-false}" = "true" ]; then
          install_filters="${install_filters} --filter @alternun/admin..."
        fi
        if [ "${INFRA_ENABLE_BACKEND_API:-false}" = "true" ]; then
          install_filters="${install_filters} --filter @alternun/api..."
        fi

        # shellcheck disable=SC2086
        pnpm install --frozen-lockfile --prefer-offline ${install_filters} \
          || pnpm install --no-frozen-lockfile --prefer-offline ${install_filters}

  pre_build:
    commands:
      - |
        if [ -f "${INFRA_PATH}/scripts/_load-infra-env.sh" ]; then
          # shellcheck source=/dev/null
          source "${INFRA_PATH}/scripts/_load-infra-env.sh"
          load_infra_env
          # CI must rely on IAM role credentials; clear any injected static credentials.
          unset AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
          echo "Infra environment loaded from .env"
        else
          echo "ERROR: Missing ${INFRA_PATH}/scripts/_load-infra-env.sh" >&2
          exit 1
        fi
      - echo "Stage    = ${SST_STAGE}"
      - echo "Node     = $(node --version)"
      - echo "pnpm     = $(pnpm --version)"
      - echo "Infra    = ${INFRA_PATH}"
      - |
        if [ -f "${INFRA_PATH}/scripts/resolve-ssm-env.sh" ]; then
          echo "Resolving Expo auth env from the canonical SSM helper..."
          # shellcheck source=/dev/null
          source "${INFRA_PATH}/scripts/resolve-ssm-env.sh"
        else
          echo "ERROR: Missing ${INFRA_PATH}/scripts/resolve-ssm-env.sh" >&2
          exit 1
        fi
      - |
        if [ -f "${INFRA_PATH}/scripts/resolve-secrets-manager-env.sh" ]; then
          echo "Resolving auth secrets from the canonical Secrets Manager helper..."
          # shellcheck source=/dev/null
          source "${INFRA_PATH}/scripts/resolve-secrets-manager-env.sh"
        else
          echo "ERROR: Missing ${INFRA_PATH}/scripts/resolve-secrets-manager-env.sh" >&2
          exit 1
        fi
      - |
        stage_normalized=$(echo "${SST_STAGE}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')
        if [ "${INFRA_ENABLE_EXPO_SITE:-true}" = "false" ]; then
          case "${stage_normalized}" in
            identity-dev|identity-prod|identity-production|auth-dev|auth-prod|authentik-dev|authentik-prod|api-dev|api-prod|api-production|backend-dev|backend-prod|backend-api-dev|backend-api-prod|admin-dev|admin-prod|admin-production|backoffice-dev|backoffice-prod|backoffice-admin-dev|backoffice-admin-prod|dashboard-dev|dashboard-prod|dashboard-production)
              ;;
            *)
              echo "WARN: INFRA_ENABLE_EXPO_SITE=false is only valid on dedicated identity/backend stages; forcing INFRA_ENABLE_EXPO_SITE=true for ${SST_STAGE}."
              export INFRA_ENABLE_EXPO_SITE=true
              ;;
          esac
        fi
      - |
        if [ -z "${INFRA_AWS_ACCOUNT_ID:-}" ] || [ "${INFRA_AWS_ACCOUNT_ID}" = "auto" ]; then
          INFRA_AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query 'Account' --output text)
          export INFRA_AWS_ACCOUNT_ID
          echo "Expected AWS Account (derived) = ${INFRA_AWS_ACCOUNT_ID}"
        else
          echo "Expected AWS Account (env) = ${INFRA_AWS_ACCOUNT_ID}"
        fi
      - |
        if [ "${INFRA_IDENTITY_ENABLED:-false}" = "true" ]; then
          stage_normalized=$(echo "${SST_STAGE}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')
          case "${stage_normalized}" in
            identity-dev|identity-prod|identity-production|auth-dev|auth-prod|authentik-dev|authentik-prod)
              if [ "${INFRA_ALLOW_IDENTITY_DATABASE_MODE_CHANGE:-false}" = "true" ]; then
                echo "Identity database mode auto-correction skipped (INFRA_ALLOW_IDENTITY_DATABASE_MODE_CHANGE=true)"
              elif command -v aws >/dev/null 2>&1 && command -v jq >/dev/null 2>&1; then
                identity_secret_name="${INFRA_IDENTITY_SECRET_DB_CREDENTIALS_NAME:-${INFRA_APP_NAME:-alternun-infra}/identity/database-credentials}"
                identity_secret_name="${identity_secret_name#/}"
                identity_secret_name="${identity_secret_name%/}"

                case "${identity_secret_name}" in
                  */"${SST_STAGE}"|*-"${SST_STAGE}")
                    scoped_identity_secret_name="${identity_secret_name}"
                    ;;
                  *)
                    scoped_identity_secret_name="${identity_secret_name}/${SST_STAGE}"
                    ;;
                esac

                current_identity_secret=$(aws secretsmanager get-secret-value \
                  --secret-id "${scoped_identity_secret_name}" \
                  --query 'SecretString' \
                  --output text 2>/dev/null || true)

                if [ -n "${current_identity_secret}" ] && [ "${current_identity_secret}" != "None" ]; then
                  current_identity_mode=$(printf '%s' "${current_identity_secret}" | jq -r '.mode // empty')
                  if [ -z "${current_identity_mode}" ] || [ "${current_identity_mode}" = "null" ]; then
                    current_identity_host=$(printf '%s' "${current_identity_secret}" | jq -r '.host // empty')
                    if [ "${current_identity_host}" = "postgres" ]; then
                      current_identity_mode="ec2"
                    elif [ -n "${current_identity_host}" ] && [ "${current_identity_host}" != "null" ]; then
                      current_identity_mode="rds"
                    fi
                  fi

                  case "$(printf '%s' "${current_identity_mode}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')" in
                    ec2|local|local-ec2)
                      current_identity_mode="ec2"
                      ;;
                    rds)
                      current_identity_mode="rds"
                      ;;
                    *)
                      current_identity_mode=""
                      ;;
                  esac

                  if [ -n "${current_identity_mode}" ] && [ "${INFRA_IDENTITY_DATABASE_MODE:-rds}" != "${current_identity_mode}" ]; then
                    echo "WARN: Correcting INFRA_IDENTITY_DATABASE_MODE from ${INFRA_IDENTITY_DATABASE_MODE:-unset} to ${current_identity_mode} based on deployed secret ${scoped_identity_secret_name}"
                    export INFRA_IDENTITY_DATABASE_MODE="${current_identity_mode}"
                  fi
                else
                  echo "Identity database mode auto-correction skipped: no existing secret at ${scoped_identity_secret_name}"
                fi
              else
                echo "Identity database mode auto-correction skipped: aws or jq is unavailable"
              fi
              ;;
          esac
        fi
      - |
        if [ "${INFRA_CERT_MODE}" = "managed" ]; then
          for cert_var in INFRA_EXPO_CERT_ARN_PRODUCTION INFRA_EXPO_CERT_ARN_DEV INFRA_EXPO_CERT_ARN_MOBILE; do
            if [ -z "${!cert_var:-}" ]; then
              export "${cert_var}="
            else
              echo "Preserving explicit certificate override: ${cert_var}"
            fi
          done
          echo "Certificate mode = managed (empty INFRA_EXPO_CERT_ARN_* values cleared; explicit site and redirect cert ARN overrides preserved)"
        else
          echo "Certificate mode = explicit (INFRA_*_CERT_ARN preserved)"
        fi
      - echo "Infra Expo Domains = production:${INFRA_EXPO_DOMAIN_PRODUCTION} dev:${INFRA_EXPO_DOMAIN_DEV} mobile:${INFRA_EXPO_DOMAIN_MOBILE}"
      - echo "Admin Site Enabled = ${INFRA_ENABLE_ADMIN_SITE}"
      - echo "Admin Site Domains = production:${INFRA_ADMIN_DOMAIN_PRODUCTION} dev:${INFRA_ADMIN_DOMAIN_DEV} mobile:${INFRA_ADMIN_DOMAIN_MOBILE}"
      - echo "Backend API Enabled = ${INFRA_ENABLE_BACKEND_API}"
      - echo "Backend API Domains = production:${INFRA_BACKEND_API_DOMAIN_PRODUCTION} dev:${INFRA_BACKEND_API_DOMAIN_DEV} mobile:${INFRA_BACKEND_API_DOMAIN_MOBILE}"
      - echo "Resolved Domains   = production:${DOMAIN_PRODUCTION} dev:${DOMAIN_DEV} mobile:${DOMAIN_MOBILE}"
      - echo "Require Expo Auth Env = ${INFRA_REQUIRE_EXPO_PUBLIC_AUTH}"
      - echo "Ensuring infra SST secrets..."
      - |
        if [ "${INFRA_ENABLE_SECRET_SYNC:-true}" != "true" ]; then
          echo "Skipping secrets sync (INFRA_ENABLE_SECRET_SYNC=${INFRA_ENABLE_SECRET_SYNC})"
        else
          set +e
          SECRET_SYNC_EXIT=0
          if [ -f "${INFRA_PATH}/scripts/ensure-secrets.sh" ]; then
            chmod +x "${INFRA_PATH}/scripts/ensure-secrets.sh" || true
            (cd "${INFRA_PATH}" && ./scripts/ensure-secrets.sh ${SST_STAGE})
            SECRET_SYNC_EXIT=$?
          elif [ -f "${INFRA_PATH}/node_modules/@lsts_tech/infra/scripts/ensure-secrets.sh" ]; then
            chmod +x "${INFRA_PATH}/node_modules/@lsts_tech/infra/scripts/ensure-secrets.sh" || true
            (cd "${INFRA_PATH}" && ./node_modules/@lsts_tech/infra/scripts/ensure-secrets.sh ${SST_STAGE})
            SECRET_SYNC_EXIT=$?
          elif [ -f "./node_modules/@lsts_tech/infra/scripts/ensure-secrets.sh" ]; then
            chmod +x "./node_modules/@lsts_tech/infra/scripts/ensure-secrets.sh" || true
            ./node_modules/@lsts_tech/infra/scripts/ensure-secrets.sh ${SST_STAGE}
            SECRET_SYNC_EXIT=$?
          else
            echo "No ensure-secrets script found; skipping"
          fi
          set -e

          if [ "${SECRET_SYNC_EXIT}" -ne 0 ]; then
            if [ "${INFRA_FAIL_ON_SECRET_SYNC}" = "true" ]; then
              echo "ERROR: Secret sync failed and INFRA_FAIL_ON_SECRET_SYNC=true"
              exit "${SECRET_SYNC_EXIT}"
            fi
            echo "WARN: Secret sync failed (exit ${SECRET_SYNC_EXIT}); continuing with deploy."
          fi
        fi
      - echo "Running pre-deploy checks..."
      - |
        if [ "${INFRA_ENABLE_PREDEPLOY_CHECKS:-true}" != "true" ]; then
          echo "Skipping pre-deploy checks (INFRA_ENABLE_PREDEPLOY_CHECKS=${INFRA_ENABLE_PREDEPLOY_CHECKS})"
        elif [ -f "${INFRA_PATH}/scripts/predeploy-checks.sh" ]; then
          chmod +x "${INFRA_PATH}/scripts/predeploy-checks.sh" || true
          "${INFRA_PATH}/scripts/predeploy-checks.sh" ${SST_STAGE}
        elif [ -f "${INFRA_PATH}/node_modules/@lsts_tech/infra/scripts/predeploy-checks.sh" ]; then
          chmod +x "${INFRA_PATH}/node_modules/@lsts_tech/infra/scripts/predeploy-checks.sh" || true
          "${INFRA_PATH}/node_modules/@lsts_tech/infra/scripts/predeploy-checks.sh" ${SST_STAGE}
        elif [ -f "./node_modules/@lsts_tech/infra/scripts/predeploy-checks.sh" ]; then
          chmod +x "./node_modules/@lsts_tech/infra/scripts/predeploy-checks.sh" || true
          ./node_modules/@lsts_tech/infra/scripts/predeploy-checks.sh ${SST_STAGE}
        else
          echo "No predeploy checks script found; skipping"
        fi

  build:
    commands:
      - |
        set -euo pipefail

        if [ -f "${INFRA_PATH}/scripts/_load-infra-env.sh" ]; then
          # shellcheck source=/dev/null
          source "${INFRA_PATH}/scripts/_load-infra-env.sh"
          load_infra_env
        fi

        if [ "${INFRA_ENABLE_BACKEND_API:-false}" = "true" ]; then
          echo "Building backend API with: ${INFRA_BACKEND_API_BUILD_COMMAND}"
          bash -lc "${INFRA_BACKEND_API_BUILD_COMMAND}"
        else
          echo "Skipping backend API build (INFRA_ENABLE_BACKEND_API=${INFRA_ENABLE_BACKEND_API:-false})"
        fi

        if [ "${INFRA_ENABLE_SST_REFRESH}" = "true" ]; then
          (cd "${INFRA_PATH}" && npx sst refresh --stage ${SST_STAGE})
        else
          echo "Skipping sst refresh (INFRA_ENABLE_SST_REFRESH=${INFRA_ENABLE_SST_REFRESH})"
        fi
      - |
        if [ -f "${INFRA_PATH}/scripts/sst-deploy.sh" ]; then
          chmod +x "${INFRA_PATH}/scripts/sst-deploy.sh" || true
          APPROVE=true RUN_PREDEPLOY_CHECKS=false STACK=${SST_STAGE} "${INFRA_PATH}/scripts/sst-deploy.sh"
        elif [ -f "${INFRA_PATH}/node_modules/@lsts_tech/infra/scripts/sst-deploy.sh" ]; then
          chmod +x "${INFRA_PATH}/node_modules/@lsts_tech/infra/scripts/sst-deploy.sh" || true
          (cd "${INFRA_PATH}" && APPROVE=true STACK=${SST_STAGE} ./node_modules/@lsts_tech/infra/scripts/sst-deploy.sh)
        elif [ -f "./node_modules/@lsts_tech/infra/scripts/sst-deploy.sh" ]; then
          chmod +x "./node_modules/@lsts_tech/infra/scripts/sst-deploy.sh" || true
          APPROVE=true STACK=${SST_STAGE} ./node_modules/@lsts_tech/infra/scripts/sst-deploy.sh
        else
          echo "ERROR: No sst-deploy script found." >&2
          exit 1
        fi
      - |
        if [ "${INFRA_ENABLE_PUBLIC_ASSET_SYNC}" != "true" ]; then
          echo "Skipping public asset sync (INFRA_ENABLE_PUBLIC_ASSET_SYNC=${INFRA_ENABLE_PUBLIC_ASSET_SYNC})"
        elif [ -f "${INFRA_PATH}/scripts/sync-public-assets.sh" ]; then
          chmod +x "${INFRA_PATH}/scripts/sync-public-assets.sh" || true
          "${INFRA_PATH}/scripts/sync-public-assets.sh" ${SST_STAGE}
        else
          echo "No public asset sync script found; skipping"
        fi

  post_build:
    commands:
      - echo "SST deploy completed for stage ${SST_STAGE}"
      - |
        if [ "${CODEBUILD_BUILD_SUCCEEDING:-1}" != "1" ]; then
          echo "Skipping post-deploy DNS sync because BUILD phase failed."
        elif [ "${INFRA_ENABLE_POSTDEPLOY_DNS_SYNC}" != "true" ]; then
          echo "Skipping post-deploy DNS sync (INFRA_ENABLE_POSTDEPLOY_DNS_SYNC=${INFRA_ENABLE_POSTDEPLOY_DNS_SYNC})"
        elif [ -f "${INFRA_PATH}/scripts/postdeploy-update-dns.sh" ]; then
          echo "Running post-deploy DNS sync"
          chmod +x "${INFRA_PATH}/scripts/postdeploy-update-dns.sh" || true
          "${INFRA_PATH}/scripts/postdeploy-update-dns.sh" ${SST_STAGE} || echo "post-deploy DNS sync failed"
        elif [ -f "${INFRA_PATH}/node_modules/@lsts_tech/infra/scripts/postdeploy-update-dns.sh" ]; then
          echo "Running post-deploy DNS sync"
          chmod +x "${INFRA_PATH}/node_modules/@lsts_tech/infra/scripts/postdeploy-update-dns.sh" || true
          "${INFRA_PATH}/node_modules/@lsts_tech/infra/scripts/postdeploy-update-dns.sh" ${SST_STAGE} || echo "post-deploy DNS sync failed"
        elif [ -f "./node_modules/@lsts_tech/infra/scripts/postdeploy-update-dns.sh" ]; then
          echo "Running post-deploy DNS sync"
          chmod +x "./node_modules/@lsts_tech/infra/scripts/postdeploy-update-dns.sh" || true
          ./node_modules/@lsts_tech/infra/scripts/postdeploy-update-dns.sh ${SST_STAGE} || echo "post-deploy DNS sync failed"
        else
          echo "No post-deploy DNS sync script found; skipping"
        fi
      - |
        if [ "${CODEBUILD_BUILD_SUCCEEDING:-1}" != "1" ]; then
          echo "Skipping reachability check because BUILD phase failed."
        elif [ "${INFRA_ENABLE_REACHABILITY_CHECK}" != "true" ]; then
          echo "Skipping reachability check (INFRA_ENABLE_REACHABILITY_CHECK=${INFRA_ENABLE_REACHABILITY_CHECK})"
        elif [ -f "${INFRA_PATH}/scripts/postdeploy-reachability-check.sh" ]; then
          chmod +x "${INFRA_PATH}/scripts/postdeploy-reachability-check.sh" || true
          "${INFRA_PATH}/scripts/postdeploy-reachability-check.sh" ${SST_STAGE}
        else
          echo "No postdeploy reachability check script found; skipping"
        fi

cache:
  paths:
    - /root/.pnpm-store/**/*
    - packages/infra/.sst/**/*
